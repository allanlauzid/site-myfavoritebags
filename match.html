<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Favorite Match — Recife</title>
<meta name="description" content="Deslize e descubra as peças que combinam com você. My Favorite Bags & My Favorite Looks — Recife.">
<script>
  // Bloqueio/visibilidade controlado pelo painel central do My Favorite Bags (localStorage compartilhado)
  // ?preview=1 permite que o admin edite/visualize a página mesmo bloqueada, sem publicar.
  const _isPreview = new URLSearchParams(location.search).get('preview') === '1';
  // Padrão: visível (só bloqueia se o admin marcar explicitamente como "locked")
  if (!_isPreview && localStorage.getItem('mfb_match_state') === 'locked') {
    location.replace('index.html');
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/cursor.css">
<link rel="stylesheet" href="css/nav.css">
<style>
:root {
  --rose:        #B68B73;
  --rose-dark:   #915E48;
  --rose-deep:   #653C2B;
  --bg:          #F3EFE9;
  --bg2:         #E7E2D9;
  --text:        #653C2B;
  --text-muted:  #AE9888;
  --line:        rgba(182,139,115,.22);
  --ease:        cubic-bezier(.4,0,.2,1);
  --gold:        #C9A646;
  --blue:        #5B7FB8;
  --green:       #2E9E6B;
  --orange:      #C97A46;
}
*,*::before,*::after{ margin:0; padding:0; box-sizing:border-box; }
html,body{ height:100%; }
body{
  font-family:'Jost',sans-serif;
  background:#150D08; /* área neutra escura, paleta do site */
  color:#fff;
  overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}

/* ─── FRAME 9:16 fixo, mesmo em desktop ─────────────────────────────── */
.frame {
  position:relative;
  width:100vw; height:100vh;
  max-width:calc(100vh * 9 / 16);
  max-height:calc(100vw * 16 / 9);
  margin:0 auto;
  background:#0F0906;
  overflow:hidden;
  display:flex; flex-direction:column;
  box-shadow:0 0 60px rgba(0,0,0,.5);
}
@media(min-width:600px){
  .frame{ border-radius:22px; box-shadow:0 20px 80px rgba(0,0,0,.6); border:1px solid rgba(255,255,255,.06); }
}

/* ─── TOP BAR — faixa mínima sobreposta ao card (full-bleed) ───────────── */
.m-top {
  position:absolute; top:0; left:0; right:0; z-index:6;
  padding:14px 16px 10px; flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:linear-gradient(to bottom, rgba(10,6,4,.55) 0%, transparent 100%);
  pointer-events:none;
}
.m-top > * { pointer-events:auto; }
.m-brand {
  display:flex; align-items:center; gap:8px; min-width:0;
}
.m-brand-t {
  font-family:'Cormorant Garamond',serif; font-size:17px; letter-spacing:.05em; color:#fff;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.m-brand-t em{ color:var(--rose); font-style:italic; }
.m-top-actions{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
.m-icon-btn {
  width:34px; height:34px; min-width:34px; min-height:34px; border-radius:50%;
  background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.28);
  color:#fff; display:flex; align-items:center; justify-content:center;
  cursor:pointer; text-decoration:none; flex-shrink:0;
}
.m-close {
  color:rgba(255,255,255,.75); text-decoration:none; font-size:13px;
  letter-spacing:.14em; text-transform:uppercase;
}
.m-filters { display:flex; gap:6px; flex-wrap:wrap; }
.mf-pill {
  font-size:12px; letter-spacing:.14em; text-transform:uppercase; line-height:1.4;
  padding:7px 14px; border-radius:20px; cursor:pointer;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.75); font-family:'Jost',sans-serif; transition:all .3s;
}
.mf-pill.on { background:var(--rose-dark); border-color:var(--rose-dark); color:#fff; }

/* ─── TELA DE CONFIGURAÇÃO (etapa 0) ────────────────────────────────────── */
.m-config {
  position:absolute; inset:0; z-index:8;
  display:flex; flex-direction:column;
  padding:clamp(1.5rem,7vw,2.2rem);
  background:linear-gradient(160deg, #1c130d 0%, #150D08 60%);
  overflow-x:hidden; overflow-y:auto;
}
.m-config::before {
  content:'';
  position:absolute;
  right:-10%;
  bottom:0;
  width:min(90%, 26rem);
  max-height:100%;
  aspect-ratio:500/976;
  background:url('webp/logo-match-background.webp') center/contain no-repeat;
  opacity:.10;
  pointer-events:none;
  z-index:0;
}
.m-config.hidden{ display:none; }
.m-config-close { position:absolute; top:14px; right:16px; z-index:2; }
.m-config-brand {
  position:relative; z-index:1; flex-shrink:0;
  text-align:center; font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.65rem,6.6vw,2.025rem); letter-spacing:.05em; color:#fff;
  text-decoration: underline;
  text-decoration-thickness: 1.5px;
  text-underline-offset: 3px;
}
.m-config-body {
  position:relative;
  z-index:1;
  display:flex; flex-direction:column; gap:clamp(1.1rem,5vw,1.6rem);
  margin-top:auto; margin-bottom:auto;
}
.m-config-brand em { color:var(--rose); font-style:italic; }
.m-config-title {
  font-family:'Cormorant Garamond',serif; color:#fff;
  font-size:clamp(1.95rem,9.1vw,2.6rem); line-height:1.15; text-wrap:balance;
}
.m-config-title em{ color:var(--rose); font-style:italic; }
.m-config-sub { font-size:clamp(.85rem,3vw,.95rem); color:rgba(255,255,255,.75); line-height:1.5; }
.m-config-group{ display:flex; flex-direction:column; gap:.6rem; }
.m-config-label {
  font-size:.75rem; letter-spacing:.16em; text-transform:uppercase; color:rgba(255,255,255,.7); line-height:1.4;
}
.m-chip-row{ display:flex; flex-wrap:wrap; gap:.5rem; }
.m-chip {
  font-size:clamp(.8rem,2.8vw,.9rem); padding:.55rem 1rem; border-radius:20px; cursor:pointer; line-height:1.4;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.16);
  color:rgba(255,255,255,.85); font-family:'Jost',sans-serif; transition:all .25s;
}
.m-chip.on{ background:var(--rose-dark); border-color:var(--rose-dark); color:#fff; }
.m-config-start {
  margin-top:.4rem; width:100%; border:none; border-radius:12px; cursor:pointer;
  background:var(--rose-dark); color:#fff; font-family:'Jost',sans-serif; font-weight:600;
  letter-spacing:.08em; text-transform:uppercase; font-size:clamp(.75rem,3vw,.85rem);
  padding:clamp(.85rem,3.6vw,1.05rem); min-height:48px;
}
.m-config-start:active{ transform:scale(.98); }
.m-config-nav {
  position:relative;
  z-index:1;
  display:flex; gap:.6rem; margin-top:auto; padding-top:1.4rem; flex-wrap:wrap; justify-content:center;
}
.m-config-navbtn {
  display:inline-flex; align-items:center; gap:7px;
  padding:9px 18px; border-radius:999px; border:1.5px solid #B8896F;
  color:#24343C; font-family:'Cormorant Garamond',serif;
  font-size:12.5px; font-weight:500; letter-spacing:.04em; text-transform:uppercase;
  text-decoration:none; background:#F6F1EC;
  transition:background .3s, box-shadow .3s;
}
.m-config-navbtn:hover { background:#EADFD7; box-shadow:0 4px 14px rgba(36,52,60,.18); }
/* ─── CARD STACK (full-bleed) ───────────────────────────────────────────── */
.m-stage {
  position:relative; flex:1; overflow:hidden;
  background:var(--bg2);
}
.m-card {
  position:absolute; inset:0;
  display:flex; flex-direction:column; justify-content:flex-end;
  transition:transform .35s var(--ease), opacity .35s var(--ease);
  will-change:transform;
  overflow:hidden;
  touch-action:pan-y;
}
.m-card.dragging{ transition:none; }
.m-card.stack-1{ z-index:2; transform:scale(.96) translateY(10px); opacity:.85; }
.m-card.stack-2{ z-index:1; transform:scale(.92) translateY(20px); opacity:.6; }
.m-card.stack-top{ z-index:3; }

.m-swipe-badge{
  position:absolute; top:clamp(3.2rem,16vw,4rem); z-index:5;
  font-family:'Jost',sans-serif; font-weight:700; font-size:clamp(1.1rem,5.5vw,1.5rem);
  letter-spacing:.08em; text-transform:uppercase; padding:.4rem .9rem;
  border-radius:8px; border:3px solid; opacity:0; pointer-events:none;
  transform:rotate(-18deg);
}
.m-swipe-badge.like{ right:clamp(1rem,5vw,1.4rem); color:var(--green); border-color:var(--green); transform:rotate(-14deg); }
.m-swipe-badge.pass{ left:clamp(1rem,5vw,1.4rem); color:#C24E4E; border-color:#C24E4E; transform:rotate(14deg); }
.m-swipe-badge.super{ left:50%; top:clamp(1.6rem,8vw,2.2rem); transform:translateX(-50%) rotate(0); color:var(--blue); border-color:var(--blue); }

/* Segmented progress bar — estilo "stories" (preparado para múltiplas fotos) */
.m-progress {
  position:absolute; top:10px; left:10px; right:10px; z-index:3;
  display:flex; gap:4px;
}
.m-progress-seg {
  flex:1; height:3px; border-radius:3px;
  background:rgba(255,255,255,.32);
  overflow:hidden;
}
.m-progress-seg.filled span { width:100%; }
.m-progress-seg span {
  display:block; height:100%; width:0%;
  background:#fff; border-radius:3px;
}

.m-card-visual {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  background:var(--bg2);
}
.m-card-visual img { width:100%; height:100%; object-fit:cover; }

/* Gradiente escuro subindo da base, estilo Tinder */
.m-card-scrim {
  position:absolute; left:0; right:0; bottom:0; height:58%;
  background:linear-gradient(to top, rgba(10,6,4,.92) 0%, rgba(10,6,4,.55) 42%, transparent 100%);
  pointer-events:none; z-index:1;
}

.m-card-info {
  position:relative; z-index:2; padding:0 20px 26px;
  display:flex; align-items:flex-end; justify-content:space-between; gap:12px;
}
.m-card-info-main { min-width:0; }
.m-card-brand {
  display:inline-block; font-size:12px; letter-spacing:.16em; text-transform:uppercase; line-height:1.4;
  padding:4px 10px; border-radius:20px; margin-bottom:9px;
  background:rgba(255,255,255,.14); color:#fff;
}
.m-card-name-row{ display:flex; align-items:center; gap:6px; margin-bottom:6px; }
.m-card-name { font-family:'Cormorant Garamond',serif; font-size:27px; line-height:1.15; color:#fff; overflow-wrap:break-word; }
.m-authentic{
  flex-shrink:0; display:inline-flex; align-items:center; justify-content:center;
  width:18px; height:18px; border-radius:50%; background:rgba(182,139,115,.25);
  color:var(--rose); border:1px solid var(--rose);
}
.m-authentic svg{ display:block; }
.m-card-cat { font-size:12px; letter-spacing:.16em; text-transform:uppercase; line-height:1.4; color:rgba(255,255,255,.78); }

.m-info-btn {
  flex-shrink:0; width:clamp(2.05rem, 8vw, 2.35rem); height:clamp(2.05rem, 8vw, 2.35rem); min-width:34px; min-height:34px; border-radius:50%;
  background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.28);
  color:#fff; font-family:'Cormorant Garamond',serif; font-size:clamp(.95rem, 4vw, 1.1rem); font-style:italic;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}

/* Selo Novidade */
.m-badge-new{
  position:absolute; top:clamp(3.4rem,15vw,4.1rem); left:clamp(.8rem,3.6vw,1.05rem); z-index:3;
  background:rgba(145,94,72,.82); color:#fff; font-size:12px; letter-spacing:.14em; text-transform:uppercase; line-height:1.4;
  padding:5px 10px; border-radius:20px; font-weight:600;
}

/* ─── PAINEL DE INFORMAÇÃO (bottom sheet) ───────────────────────────────── */
.m-info-sheet{
  position:absolute; left:0; right:0; bottom:0; z-index:7;
  background:#1c130d; border-radius:20px 20px 0 0; border-top:1px solid rgba(255,255,255,.1);
  padding:clamp(1rem,4.5vw,1.4rem) clamp(1.1rem,4.5vw,1.4rem) clamp(1.4rem,5vw,1.8rem);
  transform:translateY(100%); transition:transform .32s var(--ease);
  max-height:60%; overflow-y:auto;
}
.m-info-sheet.open{ transform:translateY(0); }
.m-info-sheet-handle{
  width:36px; height:4px; border-radius:4px; background:rgba(255,255,255,.25); margin:0 auto 14px;
}
.m-info-sheet-close{
  position:absolute; top:12px; right:14px; width:30px; height:30px; border-radius:50%;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.18); color:#fff;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.m-info-sheet-cat{ font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--rose); margin-bottom:8px; line-height:1.4; }
.m-info-sheet-desc{ font-size:clamp(.9rem,3.2vw,1rem); color:rgba(255,255,255,.85); line-height:1.55; margin-bottom:14px; }
.m-info-tags{ display:flex; flex-wrap:wrap; gap:8px; }
.m-info-tag{
  font-size:12px; letter-spacing:.05em; padding:6px 12px; border-radius:20px; line-height:1.4;
  border:1px solid var(--rose); color:var(--rose); background:transparent;
}
.m-info-backdrop{
  position:absolute; inset:0; z-index:6; background:rgba(0,0,0,.35); opacity:0; pointer-events:none; transition:opacity .3s;
}
.m-info-backdrop.open{ opacity:1; pointer-events:auto; }

.m-card.leaving-left  { transform:translateX(-140%) rotate(-12deg); opacity:0; }
.m-card.leaving-right { transform:translateX(140%) rotate(12deg); opacity:0; }

.m-empty {
  position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; text-align:center; padding:0 30px; color:rgba(255,255,255,.78);
}
.m-empty-t { font-family:'Cormorant Garamond',serif; font-size:22px; color:#fff; }
.m-empty-btn{
  margin-top:6px; border:1.5px solid var(--rose); background:transparent; color:#fff;
  border-radius:10px; padding:.8rem 1.6rem; font-family:'Jost',sans-serif; font-size:.85rem; line-height:1.4;
  letter-spacing:.1em; text-transform:uppercase; cursor:pointer; min-height:44px;
}

/* ─── ACTION BUTTONS — estilo Tinder, skin My Favorite ──────────────────── */
.m-actions {
  flex-shrink:0; display:flex; align-items:center; justify-content:center; gap:14px;
  padding:8px 10px 24px;
}
.m-abtn {
  border-radius:50%; border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:transform .2s var(--ease), box-shadow .2s var(--ease);
  background:rgba(255,255,255,.06);
  color:#fff;
}
.m-abtn:active{ transform:scale(.88); }
.m-abtn svg { display:block; }

.m-undo  { width:46px; height:46px; border:1.5px solid var(--orange); color:var(--orange); }
.m-pass  { width:58px; height:58px; border:1.5px solid #C24E4E; color:#C24E4E; }
.m-super { width:46px; height:46px; border:1.5px solid var(--blue); color:var(--blue); }
.m-like  { width:64px; height:64px; border:1.5px solid var(--green); color:var(--green); box-shadow:0 6px 22px rgba(46,158,107,.28); }

.m-abtn:disabled { opacity:.35; cursor:not-allowed; }

/* ─── MATCH OVERLAY ──────────────────────────────────────────────────── */
.m-ov {
  position:absolute; inset:0; z-index:10; display:none;
  align-items:center; justify-content:center;
  background:rgba(10,6,4,.94); backdrop-filter:blur(4px);
  padding:30px;
}
.m-ov.open{ display:flex; }
.m-ov-card { position:relative; text-align:center; width:100%; animation:mOvIn .5s var(--ease); }
.m-ov-close {
  position:absolute; top:-6px; right:-6px; width:32px; height:32px;
  display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2);
  border-radius:50%; color:#fff; cursor:pointer; font-size:16px; line-height:1;
  transition:background .3s;
}
.m-ov-close:hover { background:rgba(255,255,255,.18); }
@keyframes mOvIn{
  0%{ transform:scale(.7); opacity:0; }
  60%{ transform:scale(1.04); opacity:1; }
  100%{ transform:scale(1); opacity:1; }
}
.m-ov-emoji{ font-size:44px; margin-bottom:10px; animation:mOvPulse 1.1s ease-in-out .4s 2; }
@keyframes mOvPulse{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.18); }
}
.m-ov-t { font-family:'Cormorant Garamond',serif; font-size:26px; color:#fff; margin-bottom:6px; line-height:1.2; }
.m-ov-s { font-size:13px; color:rgba(255,255,255,.75); margin-bottom:22px; line-height:1.6; }
.m-ov-msg{
  width:100%; resize:vertical; min-height:56px; max-height:110px; margin-bottom:14px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.18); border-radius:10px;
  color:#fff; font-family:'Jost',sans-serif; font-size:clamp(.85rem,3vw,.95rem); line-height:1.45; padding:.7rem .8rem;
}
.m-ov-msg::placeholder{ color:rgba(255,255,255,.6); }
.m-ov-list { max-height:200px; overflow-y:auto; margin-bottom:22px; text-align:left; }
.m-ov-item {
  display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
  font-size:13px; color:rgba(255,255,255,.9); padding:9px 2px; border-bottom:1px solid rgba(255,255,255,.08); line-height:1.4;
}
.m-ov-item-name { min-width:0; flex:1 1 auto; overflow-wrap:break-word; }
.m-ov-star { color:var(--rose); vertical-align:-1px; flex-shrink:0; }
.m-ov-item-price { flex-shrink:0; color:#F0C9A8; font-weight:600; }
.m-ov-item-status {
  flex-shrink:0; font-size:.75rem; letter-spacing:.08em; text-transform:uppercase; line-height:1.4;
  padding:3px 7px; border-radius:20px; font-weight:600; white-space:nowrap;
}
.m-ov-item-status.available   { background:rgba(46,158,107,.16); color:#5FCB94; }
.m-ov-item-status.sold_out    { background:rgba(194,78,78,.16);  color:#E08787; }
.m-ov-item-status.coming_soon { background:rgba(91,127,184,.18); color:#8FB0EA; }
.m-ov-btn {
  display:block; width:100%; padding:13px; border-radius:10px; margin-bottom:10px;
  font-size:13px; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; line-height:1.4;
  font-family:'Jost',sans-serif; font-weight:600; text-decoration:none; border:none;
}
.m-ov-wa { background:#25D366; color:#0b3d20; }
.m-ov-continue { background:rgba(255,255,255,.1); color:#fff; border:1px solid rgba(255,255,255,.2); }

/* ─── TUTORIAL (coach marks) ──────────────────────────────────────────────── */
.m-tut { position:absolute; inset:0; z-index:9; display:none; cursor:pointer; }
.m-tut.open { display:block; }
.m-tut-backdrop {
  position:absolute; inset:0;
  background:rgba(10,6,4,.62);
  backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
}
.m-tut-target-glow {
  position:relative; z-index:11 !important;
  box-shadow:0 0 0 4px var(--rose), 0 0 22px 4px rgba(201,138,94,.65) !important;
  border-radius:50%;
  transition:box-shadow .2s;
}
.m-tut-cluster {
  position:absolute; z-index:10; display:flex; flex-direction:column;
  align-items:center; gap:8px; pointer-events:none;
}
.m-tut-cluster.point-mode { flex-direction:column-reverse; gap:6px; }
.m-tut-clone { position:absolute; z-index:11; pointer-events:none; }
.m-tut-text {
  font-family:'Cormorant Garamond',serif; font-weight:400; font-style:italic;
  color:#fff; font-size:clamp(1.05rem,4.4vw,1.3rem); line-height:1.3;
  text-align:center; max-width:230px; text-wrap:balance;
  text-shadow:0 2px 10px rgba(0,0,0,.6);
}
.m-tut-text b { font-style:normal; font-weight:600; color:var(--rose); }
.m-tut-hand-wrap { width:41px; height:124px; position:relative; }
.m-tut-hand {
  position:absolute; left:50%; top:50%; width:41px;
  transform:translate(-50%,-50%);
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.5));
}
.m-tut-hand img { display:block; width:100%; height:auto; pointer-events:none; }
.m-tut-hand.swipe-right { animation:tutSwipeRight 1.4s ease-in-out infinite; }
.m-tut-hand.swipe-left  { animation:tutSwipeLeft 1.4s ease-in-out infinite; }
.m-tut-hand.swipe-up    { animation:tutSwipeUp 1.4s ease-in-out infinite; }
.m-tut-hand.point-above { animation:tutPointPulseDown 1.2s ease-in-out infinite; }
.m-tut-hand.point-below { animation:tutPointPulseUp 1.2s ease-in-out infinite; }
@keyframes tutSwipeRight {
  0%   { transform:translate(calc(-50% - 14px),-50%) scaleY(-1) rotate(90deg); opacity:0; }
  20%  { opacity:1; }
  80%  { opacity:1; }
  100% { transform:translate(calc(-50% + 14px),-50%) scaleY(-1) rotate(90deg); opacity:0; }
}
@keyframes tutSwipeLeft {
  0%   { transform:translate(calc(-50% + 14px),-50%) rotate(-90deg); opacity:0; }
  20%  { opacity:1; }
  80%  { opacity:1; }
  100% { transform:translate(calc(-50% - 14px),-50%) rotate(-90deg); opacity:0; }
}
@keyframes tutSwipeUp {
  0%   { transform:translate(-50%, calc(-50% + 14px)) rotate(0deg); opacity:0; }
  20%  { opacity:1; }
  80%  { opacity:1; }
  100% { transform:translate(-50%, calc(-50% - 14px)) rotate(0deg); opacity:0; }
}
@keyframes tutPointPulseDown {
  0%,100% { transform:translate(-50%,-50%) rotate(180deg) scaleX(-1); }
  50%     { transform:translate(-50%, calc(-50% + 8px)) rotate(180deg) scaleX(-1); }
}
@keyframes tutPointPulseUp {
  0%,100% { transform:translate(-50%,-50%) rotate(0deg); }
  50%     { transform:translate(-50%, calc(-50% - 8px)) rotate(0deg); }
}
.m-tut-skip {
  position:absolute; right:20px; top:58%; z-index:10;
  background:transparent; border:none; color:rgba(255,255,255,.65);
  font-family:'Jost',sans-serif; font-size:.8rem; letter-spacing:.04em; cursor:pointer;
  text-decoration:underline; padding:.5rem;
}

/* Responsive hardening for the 9:16 match experience */
html, body {
  width:100%;
  max-width:100%;
  min-height:100%;
  -webkit-text-size-adjust:100%;
}
body { min-height:100svh; }
img, svg { max-width:100%; height:auto; }
a, button, [onclick] { touch-action:manipulation; }
a:focus-visible,
button:focus-visible {
  outline:2px solid var(--rose);
  outline-offset:3px;
}
.frame {
  width:100vw;
  height:100svh;
  max-width:min(calc(100svh * 9 / 16), 32rem);
  max-height:100svh;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}
.m-top {
  padding:clamp(.7rem, 3.4vw, 1rem) clamp(.8rem, 3.6vw, 1.05rem) clamp(.5rem, 2.4vw, .65rem);
  gap:clamp(.45rem, 2.4vw, .65rem);
}
.m-brand { gap:.85rem; }
.m-brand-t {
  min-width:0;
  font-size:clamp(1.05rem, 5vw, 1.32rem);
  line-height:1.12;
  text-wrap:balance;
}
.m-close {
  min-width:44px;
  min-height:44px;
  display:inline-flex;
  align-items:center;
  justify-content:flex-end;

}
.m-filters {
  flex-wrap:wrap;
  gap:clamp(.35rem, 1.8vw, .5rem);
}
.mf-pill {
  flex:1 1 0;
  min-width:max-content;
  min-height:40px;
  padding:clamp(.5rem, 2.2vw, .65rem) clamp(.7rem, 3.2vw, .95rem);
  font-size:clamp(.75rem, 2.3vw, .8rem);
  line-height:1.4;
  letter-spacing:clamp(.08em, .6vw, .14em);
}
.m-card, .m-card-visual { border-radius:0; }
.m-card-info {
  padding:0 clamp(1rem, 4.2vw, 1.25rem) clamp(1.15rem, 5vw, 1.65rem);
}
.m-card-brand {
  font-size:clamp(.75rem, 2.1vw, .8rem);
  line-height:1.4;
  letter-spacing:clamp(.1em, .6vw, .16em);
}
.m-card-name {
  font-size:clamp(1.45rem, 6.5vw, 1.95rem);
  line-height:1.08;
  overflow-wrap:break-word;
  text-wrap:balance;
}
.m-card-cat {
  font-size:clamp(.75rem, 2.5vw, .8rem);
  line-height:1.4;

}
.m-actions {
  gap:clamp(.6rem, 3.6vw, 1rem);
  padding:clamp(.4rem, 2vw, .55rem) clamp(.4rem, 2vw, .6rem) clamp(1rem, 5vw, 1.5rem);
}
.m-undo, .m-super {
  width:clamp(2.55rem, 11vw, 2.95rem);

.m-pass {

<script>
// ─── DADOS ──────────────────────────────────────────────────────────────────
// Fonte única compartilhada com index.html (Bags) e looks.html (Looks).
// Editar um produto em qualquer catálogo reflete aqui automaticamente,
// pois todas as páginas leem os mesmos arrays window.MFB_BAGS / window.MFB_LOOKS.
// Segmentação leve de "ocasião" para itens que ainda não têm o campo explícito nos dados.
function inferOccasion(p, brand) {
  if (p.occasion) return p.occasion;
  if (brand === 'bags') {
    if (p.cat === 'clutch') return 'ocasiao-especial';
    const priceNum = parseInt(String(p.price).replace(/\D/g,''), 10) || 0;
    if (priceNum >= 450) return 'ocasiao-especial';
    return 'dia-a-dia';
  }
  return 'dia-a-dia';
}
function buildBagsItems() {
  return (window.MFB_BAGS  || []).filter(p => p.status !== 'hidden').map(p => ({
    name:p.name, cat:'Bolsa', catLabel: {tote:'Tote Bag',shoulder:'Shoulder',clutch:'Clutch',mini:'Mini Bag'}[p.cat] || p.cat,
    price:p.price, status:p.status || 'available', brand:'bags', img:p.img,
    isNew: !!p.isNew, tags: Array.isArray(p.tags) ? p.tags : [], occasion: inferOccasion(p,'bags'),
  }));
}
function buildLooksItems() {
  return (window.MFB_LOOKS || []).filter(p => p.status !== 'hidden').map(p => ({
    name:p.name, catLabel: {colar:'Colar',brinco:'Brinco',pulseira:'Pulseira',anel:'Anel'}[p.cat] || p.cat,
    cat: {colar:'Colar',brinco:'Brinco',pulseira:'Pulseira',anel:'Anel'}[p.cat] || p.cat,
    price:p.price, status:p.status || 'available', brand:'looks', img:p.img,
    isNew: !!p.isNew, tags: Array.isArray(p.tags) ? p.tags : [], occasion: inferOccasion(p,'looks'),
  }));
}
let BAGS_ITEMS  = buildBagsItems();
let LOOKS_ITEMS = buildLooksItems();
let ALL_ITEMS = [...BAGS_ITEMS, ...LOOKS_ITEMS].map((it,i)=>({ ...it, id:i }));

// Busca os dados atuais no banco (Supabase) assim que a página abre, pra não
// ficar mostrando bolsas/peças antigas que já foram removidas/editadas no
// admin. Se o banco falhar, continua usando os dados locais (fallback).
async function refreshMatchItemsFromDB() {
  try {
    const [dbBags, dbLooks] = await Promise.all([sbFetchBags(), sbFetchLooks()]);
    if (dbBags && dbBags.length) window.MFB_BAGS = dbBags;
    if (dbLooks && dbLooks.length) window.MFB_LOOKS = dbLooks;
    BAGS_ITEMS  = buildBagsItems();
    LOOKS_ITEMS = buildLooksItems();
    ALL_ITEMS = [...BAGS_ITEMS, ...LOOKS_ITEMS].map((it,i)=>({ ...it, id:i }));
  } catch (e) {
    console.warn('Não foi possível atualizar itens do Match a partir do banco, usando dados locais.', e);
  }
}
refreshMatchItemsFromDB();

const BRAND_LABEL = { bags:'My Favorite Bags', looks:'My Favorite Looks' };
const STATUS_LABEL_PT = { available:'Disponível', sold_out:'Esgotado', coming_soon:'Em Breve' };
const WA_NUMBER = '5581995966968';

// Ícones SVG genéricos (fallback para itens sem foto — ex.: Looks)
function placeholderSVG(cat) {
  const c = '#B68B73';
  const map = {
    'Colar':    `<svg viewBox="0 0 200 220" width="46%" fill="none"><path d="M40 60Q100 130 160 60" stroke="${c}" stroke-width="2.4" fill="none"/><circle cx="100" cy="128" r="12" stroke="${c}" stroke-width="2.2" fill="none"/></svg>`,
    'Brinco':   `<svg viewBox="0 0 200 220" width="46%" fill="none"><circle cx="100" cy="60" r="9" stroke="${c}" stroke-width="2.2" fill="none"/><path d="M78 100Q100 150 122 100" stroke="${c}" stroke-width="2.2" fill="none"/></svg>`,
    'Pulseira': `<svg viewBox="0 0 200 220" width="46%" fill="none"><ellipse cx="100" cy="110" rx="70" ry="34" stroke="${c}" stroke-width="2.4" fill="none"/></svg>`,
    'Anel':     `<svg viewBox="0 0 200 220" width="46%" fill="none"><circle cx="100" cy="130" r="42" stroke="${c}" stroke-width="2.6" fill="none"/><path d="M82 92L100 64L118 92Z" stroke="${c}" stroke-width="2.2" fill="none"/></svg>`,
  };
  return map[cat] || map['Colar'];
}

// ─── STATE ─────────────────────────────────────────────────────────────────
let filter = localStorage.getItem('mfb_match_default_filter') || 'all';
let occasion = 'all';
let queue = [];
let likes = [];
let history = []; // pilha de decisões para permitir "desfazer"
let started = false;
let infoOpen = false;

function filteredItems() {
  let list = ALL_ITEMS;
  if (filter === 'bags') list = list.filter(i => i.brand === 'bags');
  else if (filter === 'looks') list = list.filter(i => i.brand === 'looks');
  if (occasion !== 'all') list = list.filter(i => i.occasion === occasion);
  return list;
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('#mFilters .m-chip').forEach(b => b.classList.toggle('on', b.dataset.f === f));
}
function setOccasion(o) {
  occasion = o;
  document.querySelectorAll('#mOccasions .m-chip').forEach(b => b.classList.toggle('on', b.dataset.o === o));
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function updateUndoBtn() {
  const btn = document.getElementById('btnUndo');
  if (btn) btn.disabled = history.length === 0;
}

// ─── ETAPA 0: TELA DE CONFIGURAÇÃO ──────────────────────────────────────────
function openConfig() {
  document.getElementById('mConfig').classList.remove('hidden');
  document.getElementById('mTop').style.display = 'none';
  document.getElementById('mStage').style.display = 'none';
  document.getElementById('mActions').style.display = 'none';
}

function startSwiping() {
  let list = filteredItems();
  if (!list.length) list = ALL_ITEMS.slice(); // fallback: evita ficar vazio se combinação não bate com nada
  queue = shuffle(list.slice());
  history = [];
  started = true;
  updateUndoBtn();
  document.getElementById('mConfig').classList.add('hidden');
  document.getElementById('mTop').style.display = 'flex';
  document.getElementById('mStage').style.display = 'block';
  document.getElementById('mActions').style.display = 'flex';
  render();
  startTutorial();
}

// ─── TUTORIAL (coach marks) ─────────────────────────────────────────────────
const TUTORIAL_STEPS = [
  { type:'swipe-right', text:'Arraste o card para a <b>direita</b> para curtir uma peça.' },
  { type:'swipe-left',  text:'Arraste para a <b>esquerda</b> para passar para a próxima.' },
  { type:'swipe-up',    text:'Arraste para <b>cima</b> para favoritar uma peça que você amou.' },
  { type:'point', handSide:'above', target:'#btnUndo', text:'Toque aqui para <b>voltar</b> e desfazer a última escolha.' },
  { type:'point', handSide:'below', target:'#mTop button.m-icon-btn', text:'Toque aqui para abrir as <b>configurações</b> e trocar o filtro.', offsetY:8, handOffsetX:15, handOffsetY:6 },
  { type:'point', handSide:'below', target:'#mTop a.m-icon-btn', text:'Toque aqui para <b>sair</b> do My Favorite Match.', offsetY:8, handOffsetX:55, handOffsetY:6 },
];
let tutStep = 0;
let tutCloneEl = null;

function startTutorial() {
  tutStep = 0;
  document.getElementById('mTut').classList.add('open');
  renderTutorialStep();
}

function renderTutorialStep() {
  clearTutorialHighlight();
  const step = TUTORIAL_STEPS[tutStep];
  const hand = document.getElementById('mTutHand');
  const textEl = document.getElementById('mTutText');
  const cluster = document.getElementById('mTutCluster');

  textEl.innerHTML = step.text;
  hand.className = 'm-tut-hand';
  cluster.classList.remove('point-mode');
  cluster.style.top = '';
  cluster.style.bottom = '';
  cluster.style.left = '';
  cluster.style.transform = '';
  document.getElementById('mTutHandWrap').style.transform = '';

  const frame = document.querySelector('.frame');
  const frameR = frame.getBoundingClientRect();

  if (step.type === 'point') {
    const target = document.querySelector(step.target);
    if (target) {
      const r = target.getBoundingClientRect();
      const offsetX = step.offsetX || 0;
      const offsetY = step.offsetY || 0;
      const rawX = r.left - frameR.left + r.width / 2 + offsetX;
      const clampedX = Math.min(Math.max(rawX, 95), frameR.width - 95);
      cluster.style.left = clampedX + 'px';
      cluster.style.transform = 'translateX(-50%)';

      if (step.handSide === 'below') {
        // Clona o botão real e o desenha por cima do blur, na posição exata,
        // para que ele fique nítido enquanto o resto da tela permanece desfocado.
        const clone = target.cloneNode(true);
        clone.removeAttribute('id');
        clone.classList.add('m-tut-clone', 'm-tut-target-glow');
        clone.style.left = (r.left - frameR.left) + 'px';
        clone.style.top = (r.top - frameR.top) + 'px';
        clone.style.width = r.width + 'px';
        clone.style.height = r.height + 'px';
        clone.style.margin = '0';
        document.getElementById('mTut').appendChild(clone);
        tutCloneEl = clone;

        cluster.classList.add('point-mode');
        cluster.style.top = (r.bottom - frameR.top + 2 + offsetY) + 'px';
        hand.classList.add('point-below');
        if (step.handOffsetX || step.handOffsetY) {
          const hx = step.handOffsetX || 0;
          const hy = step.handOffsetY || 0;
          document.getElementById('mTutHandWrap').style.transform = `translate(${hx}px, ${hy}px)`;
        }
      } else {
        target.classList.add('m-tut-target-glow');
        target.style.pointerEvents = 'none';
        cluster.style.bottom = (frameR.height - (r.top - frameR.top) + 14) + 'px';
        hand.classList.add('point-above');
      }
    }
  } else {
    cluster.style.left = '50%';
    cluster.style.top = '36%';
    cluster.style.transform = 'translate(-50%,-50%)';
    hand.classList.add(step.type);
  }
}

function nextTutorialStep() {
  tutStep++;
  if (tutStep >= TUTORIAL_STEPS.length) { skipTutorial(); return; }
  renderTutorialStep();
}

function skipTutorial() {
  clearTutorialHighlight();
  document.getElementById('mTut').classList.remove('open');
}

function clearTutorialHighlight() {
  document.querySelectorAll('.m-tut-target-glow').forEach(el => {
    el.classList.remove('m-tut-target-glow');
    el.style.pointerEvents = '';
  });
  if (tutCloneEl) { tutCloneEl.remove(); tutCloneEl = null; }
}

// ─── FEEDBACK SENSORIAL ─────────────────────────────────────────────────────
function vibrate(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e) {}
}
let _audioCtx = null;
function playMatchSound() {
  try {
    _audioCtx = _audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _audioCtx;
    const t0 = ctx.currentTime;
    [0, .12].forEach((delay, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = i === 0 ? 660 : 880;
      gain.gain.setValueAtTime(0.0001, t0 + delay);
      gain.gain.exponentialRampToValueAtTime(0.18, t0 + delay + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + delay + 0.25);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t0 + delay);
      osc.stop(t0 + delay + 0.28);
    });
  } catch(e) {}
}

function render() {
  const stage = document.getElementById('mStage');
  if (!queue.length) {
    stage.innerHTML = `<div class="m-empty">
      <div class="m-empty-t">Você viu tudo por aqui ✨</div>
      <p>Reembaralhamos as peças pra você continuar curtindo.</p>
      <button class="m-empty-btn" onclick="reshuffleLoop()">Ver de novo</button>
    </div>`;
    clearTimeout(window._loopTimer);
    window._loopTimer = setTimeout(() => { if (!queue.length) reshuffleLoop(); }, 4000);
    return;
  }
  const visible = queue.slice(0, 3);
  stage.innerHTML = visible.map((it, idx) => {
    const cls = idx === 0 ? 'stack-top' : (idx === 1 ? 'stack-1' : 'stack-2');
    return cardHTML(it, cls);
  }).reverse().join('');
  const topCard = stage.querySelector('.stack-top');
  if (topCard) attachDrag(topCard);
}

// ─── LOOP INFINITO ───────────────────────────────────────────────────────────
function reshuffleLoop() {
  clearTimeout(window._loopTimer);
  let list = filteredItems();
  if (!list.length) list = ALL_ITEMS.slice();
  queue = shuffle(list.slice());
  render();
}

// ─── DECISÃO (clique nos botões OU gesto) ───────────────────────────────────
function decide(action) {
  if (action === 'undo') {
    if (!history.length) return;
    const last = history.pop();
    if (last.action === 'like' || last.action === 'super') {
      likes = likes.filter(l => l.id !== last.item.id);
    }
    queue.unshift(last.item);
    updateUndoBtn();
    render();
    return;
  }

  if (!queue.length) return;
  const it = queue[0];
  const card = document.querySelector('.m-card.stack-top');
  const isLike = action === 'like' || action === 'super';
  if (card) {
    card.style.transition = 'transform .35s var(--ease), opacity .35s var(--ease)';
    if (action === 'super') card.style.transform = 'translateY(-140%) rotate(0deg)';
    else card.classList.add(isLike ? 'leaving-right' : 'leaving-left');
  }
  vibrate(isLike ? [20, 30, 20] : 15);

  setTimeout(() => {
    queue.shift();
    history.push({ action, item: it });
    updateUndoBtn();
    if (isLike) {
      likes.push({ ...it, superLiked: action === 'super' });
      render();
      openMatchOverlay();
    } else {
      render();
    }
  }, 260);
}

// ─── DRAG / SWIPE NATIVO (mouse + touch) ────────────────────────────────────
function attachDrag(card) {
  let startX = 0, startY = 0, dx = 0, dy = 0, dragging = false, wasDrag = false;
  const threshold = 100;
  const tapThreshold = 6;
  const likeBadge = card.querySelector('.m-swipe-badge.like');
  const passBadge = card.querySelector('.m-swipe-badge.pass');
  const superBadge = card.querySelector('.m-swipe-badge.super');

  function onDown(x, y) {
    dragging = true; wasDrag = false; startX = x; startY = y; dx = 0; dy = 0;
    card.classList.add('dragging');
  }
  function onMove(x, y) {
    if (!dragging) return;
    dx = x - startX; dy = y - startY;
    if (Math.abs(dx) > tapThreshold || Math.abs(dy) > tapThreshold) wasDrag = true;
    const rot = Math.max(-15, Math.min(15, dx / 20));
    card.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
    const distX = Math.min(Math.abs(dx) / threshold, 1);
    const distY = Math.min(Math.abs(dy) / threshold, 1);
    if (dy < -20 && Math.abs(dy) > Math.abs(dx)) {
      superBadge.style.opacity = distY;
      likeBadge.style.opacity = 0; passBadge.style.opacity = 0;
    } else if (dx > 0) {
      likeBadge.style.opacity = distX; passBadge.style.opacity = 0; superBadge.style.opacity = 0;
    } else if (dx < 0) {
      passBadge.style.opacity = distX; likeBadge.style.opacity = 0; superBadge.style.opacity = 0;
    }
  }
  function onUp() {
    if (!dragging) return;
    dragging = false;
    card.classList.remove('dragging');
    const isVerticalSwipe = dy < -threshold && Math.abs(dy) > Math.abs(dx);
    if (isVerticalSwipe) {
      decide('super');
    } else if (dx > threshold) {
      decide('like');
    } else if (dx < -threshold) {
      decide('pass');
    } else {
      card.style.transition = 'transform .3s var(--ease)';
      card.style.transform = '';
      likeBadge.style.opacity = 0; passBadge.style.opacity = 0; superBadge.style.opacity = 0;
    }
  }

  card.addEventListener('mousedown', e => { onDown(e.clientX, e.clientY); e.preventDefault(); });
  window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', onUp);

  card.addEventListener('touchstart', e => { const t = e.touches[0]; onDown(t.clientX, t.clientY); }, {passive:true});
  card.addEventListener('touchmove', e => { const t = e.touches[0]; onMove(t.clientX, t.clientY); }, {passive:true});
  card.addEventListener('touchend', onUp);

  // ─── TOQUE NAS LATERAIS: direita = curtir, esquerda = passar ─────────────
  card.addEventListener('click', e => {
    if (wasDrag) return;
    if (e.target.closest('.m-info-btn')) return;
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    if (x > rect.width / 2) decide('like');
    else decide('pass');
  });
}

// ─── MENSAGEM WHATSAPP AGRUPADA POR STATUS ──────────────────────────────────
function buildWaMessage() {
  const available   = likes.filter(l => l.status === 'available');
  const soldOut     = likes.filter(l => l.status === 'sold_out');
  const comingSoon  = likes.filter(l => l.status === 'coming_soon');

  const parts = [];
  parts.push('Olá! Dei match em algumas peças no My Favorite Match:');

  if (available.length) {
    parts.push(`\n\nDisponíveis (gostaria de mais informações):\n${available.map(l => `- ${l.name}${l.superLiked ? ' *[Favorito]*' : ''} (${l.price})`).join('\n')}`);
  }
  if (soldOut.length) {
    parts.push(`\n\nEsgotadas (gostaria de saber se há previsão de chegada/reposição):\n${soldOut.map(l => `- ${l.name}${l.superLiked ? ' *[Favorito]*' : ''}`).join('\n')}`);
  }
  if (comingSoon.length) {
    parts.push(`\n\nEm Breve (gostaria de saber a previsão de chegada):\n${comingSoon.map(l => `- ${l.name}${l.superLiked ? ' *[Favorito]*' : ''}`).join('\n')}`);
  }
  const extra = (document.getElementById('mOvMsg') || {}).value?.trim();
  if (extra) {
    parts.push(`\n\nMensagem: ${extra}`);
  }
  return parts.join('');
}

function openMatchOverlay() {
  document.getElementById('mOvSub').innerHTML = `Você já curtiu <b id="mOvCount">${likes.length}</b> peça${likes.length !== 1 ? 's' : ''}.`;
  document.getElementById('mOvList').innerHTML = likes.map(l => `
    <div class="m-ov-item">
      <span class="m-ov-item-name">${l.superLiked ? '<svg class="m-ov-star" width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7-6.2-3.8L5.8 21l1.6-7L2 9.2l7.1-.6L12 2z"/></svg> ' : ''}${l.name} <span style="opacity:.5;">(${BRAND_LABEL[l.brand]})</span></span>
      ${l.status === 'available' ? `<span class="m-ov-item-price">${l.price}</span>` : ''}
      <span class="m-ov-item-status ${l.status}">${STATUS_LABEL_PT[l.status]}</span>
    </div>`).join('');
  const msgBox = document.getElementById('mOvMsg');
  if (msgBox) msgBox.value = '';
  const updateWaLink = () => {
    const msg = buildWaMessage();
    document.getElementById('mOvWa').href = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
  };
  updateWaLink();
  if (msgBox) msgBox.oninput = updateWaLink;
  document.getElementById('mOv').classList.add('open');
  vibrate([20, 40, 20, 40, 30]);
  playMatchSound();
}
function closeMatchOverlay() {
  document.getElementById('mOv').classList.remove('open');
}
